name: Hermes (review)

# Two ways to get a review from the s3ntin3l8-hermes bot:
#   1. auto-review    -> once, when a non-draft PR is opened.
#   2. on-demand-review -> comment "@s3ntin3l8-hermes Review" (or "Triage" on
#      an issue) any time you want another look -- including every follow-up
#      after the first auto-review, and for draft PRs marked ready.
# Both call the same reusable workflow (s3ntin3l8/.github/.github/workflows/
# hermes-review.yml@main) with a different `mode`, gated by github.event_name
# so each job only runs for its own trigger.
#
# IMPORTANT: auto-review is intentionally `opened` ONLY -- do not add
# `synchronize` (or `ready_for_review`) back. Each of those re-triggers a
# fresh review on every subsequent push/transition; on a PR under active
# iteration that's an unbounded review loop (each review's comments prompt
# more commits, each commit fires another review...). Confirmed in practice
# on PR #16: 5 pushes while responding to feedback produced 5 separate
# Hermes review submissions. One entry point (`opened`) plus on-demand for
# every deliberate follow-up avoids this by construction.
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
    # Covers both PR-conversation comments and issue comments. The reusable
    # workflow's "Check mention" step enforces the "@s3ntin3l8-hermes" substring
    # in on-demand mode (default), so a plain comment without the mention is a
    # cheap no-op, not a review.

jobs:
  auto-review:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 's3ntin3l8-hermes[bot]' &&
      github.event.pull_request.draft == false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    uses: s3ntin3l8/.github/.github/workflows/hermes-review.yml@main
    with:
      mode: auto # review on trigger, no @mention needed
      mention-trigger: s3ntin3l8-hermes
    secrets: inherit # pragma: allowlist secret

  on-demand-review:
    if: >-
      github.event_name == 'issue_comment' &&
      github.actor != 's3ntin3l8-hermes[bot]'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    uses: s3ntin3l8/.github/.github/workflows/hermes-review.yml@main
    with:
      mention-trigger: s3ntin3l8-hermes # mode: on-demand is the reusable workflow's default
    secrets: inherit # pragma: allowlist secret
